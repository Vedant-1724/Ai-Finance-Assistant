# PATH: Finance and Accounting Assistant/src/main/resources/application.yaml
# UPDATED: Added mail config, scheduling, GST tax settings

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/financedb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:vedant}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    out-of-order: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

  cache:
    type: redis
    redis:
      time-to-live: 3600000   # 1 hour in ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ── Email (SendGrid / Gmail SMTP) ──────────────────────────────────────────
  # For SendGrid: host=smtp.sendgrid.net, port=587, username=apikey
  # For Gmail:    host=smtp.gmail.com, port=587, enable app password
  mail:
    host: ${MAIL_HOST:smtp.sendgrid.net}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:apikey}
    password: ${MAIL_PASSWORD:your-sendgrid-api-key}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    from: ${MAIL_FROM:noreply@financeai.in}

  # ── Scheduling ────────────────────────────────────────────────────────────
  task:
    scheduling:
      pool:
        size: 4

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_USE_A_64_CHAR_RANDOM_STRING_HERE_12345678}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# ── Razorpay ──────────────────────────────────────────────────────────────────
razorpay:
  key:
    id: ${RAZORPAY_KEY_ID:rzp_test_YOUR_KEY_ID_HERE}
    secret: ${RAZORPAY_KEY_SECRET:YOUR_KEY_SECRET_HERE}
  webhook:
    secret: ${RAZORPAY_WEBHOOK_SECRET:YOUR_WEBHOOK_SECRET_HERE}

# ── AI Service (Python Flask) ─────────────────────────────────────────────────
ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:5001}

# ── App config ────────────────────────────────────────────────────────────────
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  free-tier:
    max-transactions: 20
    max-transactions-view: 10
  mail:
    from: ${MAIL_FROM:noreply@financeai.in}
    enabled: ${MAIL_ENABLED:false}   # set true in production

# ── Rate limiting ─────────────────────────────────────────────────────────────
security:
  rate-limit:
    login-max-attempts: 5
    login-window-minutes: 1

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
