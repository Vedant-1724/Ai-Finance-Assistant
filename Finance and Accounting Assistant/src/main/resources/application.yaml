# PATH: Finance and Accounting Assistant/src/main/resources/application.yaml

spring:
  application:
    name: FinanceAssistant
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/financedb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: true
    ignore-missing-migrations: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  cache:
    type: redis
    redis:
      time-to-live: 3600000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${MAIL_HOST:smtp.sendgrid.net}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:apikey}
    password: ${MAIL_PASSWORD:your-sendgrid-api-key}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    from: ${MAIL_FROM:noreply@financeai.in}

  task:
    scheduling:
      pool:
        size: 4

jwt:
  secret: ${JWT_SECRET:default-jwt-secret-change-me-in-production-1234567890abcdef}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

razorpay:
  key:
    id: ${RAZORPAY_KEY_ID:}
    secret: ${RAZORPAY_KEY_SECRET:}
  webhook:
    secret: ${RAZORPAY_WEBHOOK_SECRET:}

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:5001}
    api.key: ${AI_SERVICE_API_KEY:${INTERNAL_API_KEY:}}

bank:
  sync:
    provider: ${BANK_SYNC_PROVIDER:AUTO}

setu:
  base-url: ${SETU_BASE_URL:}
  client-id: ${SETU_CLIENT_ID:}
  client-secret: ${SETU_CLIENT_SECRET:}
  consent-path: ${SETU_CONSENT_PATH:/consents}
  transactions-path: ${SETU_TRANSACTIONS_PATH:/consents/{consentId}/transactions}
  callback-url: ${SETU_CALLBACK_URL:http://localhost:8080/api/v1/setu/callback}

app:
  base-url: ${APP_BASE_URL:http://localhost:5173}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  free-tier:
    max-transactions: 20
    max-transactions-view: 10
  mail:
    from: ${MAIL_FROM:noreply@financeai.in}
    enabled: ${MAIL_ENABLED:false}
    expose-links-when-disabled: ${MAIL_EXPOSE_LINKS_WHEN_DISABLED:true}
  rabbit:
    enabled: ${RABBIT_ENABLED:true}

security:
  rate-limit:
    login-max-attempts: 5
    login-window-minutes: 1

management:
  health:
    mail:
      enabled: false
  endpoint:
    health:
      show-details: when-authorized
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

