services:
  - type: web
    name: finance-ai
    runtime: docker
    dockerfilePath: ./finance-ai/Dockerfile
    dockerContext: ./finance-ai
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 5001
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-pro
      - key: GEMINI_STATEMENT_MODEL
        value: gemini-2.5-pro
      - key: INTERNAL_API_KEY
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CLOUDAMQP_URL
        sync: false
