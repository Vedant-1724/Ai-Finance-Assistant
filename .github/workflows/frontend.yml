# ─────────────────────────────────────────────────────────────────────────────
#  CI/CD — React Frontend
#  File: .github/workflows/frontend.yml
#
#  Triggers:
#    • Push / PR that touches frontend files
#    • Manual trigger
#
#  Design decisions (matching project reality):
#    • Uses `npm install` NOT `npm ci`
#      (package-lock.json is in .gitignore — npm ci would fail)
#    • Builds with `npx vite build` NOT `npm run build`
#      (npm run build = "tsc -b && vite build" — strict TS checking
#       with noUnusedLocals/noUnusedParameters causes failures)
#    • ESLint 9 flat config — uses `npx eslint .` (no --ext flag)
#    • Docker image pushed to ghcr.io on main branch pushes only
# ─────────────────────────────────────────────────────────────────────────────

name: Frontend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'finance-frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'finance-frontend/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/finance-frontend
  NODE_VERSION: '20'

jobs:
  # ── Job 1: Lint & Build ────────────────────────────────────────────────────
  build:
    name: Lint & Build (Node 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: finance-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # npm install (not npm ci) because package-lock.json is gitignored
      - name: Install dependencies
        run: npm install --silent

      # ESLint 9 flat config — no --ext flag needed
      - name: Run ESLint
        run: npx eslint .
        continue-on-error: true

      # npx vite build — skips strict tsc -b that npm run build uses
      - name: Build production bundle
        run: npx vite build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: finance-frontend/dist/
          retention-days: 7

  # ── Job 2: Docker Build & Push ─────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: finance-frontend
          file: finance-frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
