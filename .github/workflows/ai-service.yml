# ─────────────────────────────────────────────────────────────────────────────
#  CI/CD — Python AI Service
#  File: .github/workflows/ai-service.yml
#
#  Triggers:
#    • Push / PR that touches AI service files
#    • Manual trigger
#
#  Design decisions (matching project reality):
#    • Installs tesseract-ocr + poppler-utils (needed by ocr_invoice.py,
#      pdf2image, and pytesseract)
#    • Sets INTERNAL_API_KEY env var (required by app.py on import)
#    • Runs pytest on tests/ directory with fixture files
#    • flake8 lint is non-blocking (continue-on-error)
#    • Docker image pushed to ghcr.io on main branch pushes only
# ─────────────────────────────────────────────────────────────────────────────

name: AI Service CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'finance-ai/**'
      - '.github/workflows/ai-service.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'finance-ai/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/finance-ai

jobs:
  # ── Job 1: Lint & Test ─────────────────────────────────────────────────────
  test:
    name: Lint & Test (Python 3.11)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: finance-ai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: finance-ai/requirements.txt

      # tesseract-ocr needed by pytesseract/ocr_invoice.py
      # poppler-utils needed by pdf2image
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-eng poppler-utils

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest flake8

      # flake8 lint — non-blocking
      - name: Lint with flake8
        run: |
          flake8 . \
            --count \
            --max-line-length=120 \
            --extend-ignore=E501,W503,E402 \
            --exclude=__pycache__,models,.venv \
            --statistics
        continue-on-error: true

      # Run tests with required environment variables
      - name: Run pytest
        env:
          PYTHONPATH: .
          INTERNAL_API_KEY: "ci-test-key"
          GEMINI_API_KEY: "test-key-placeholder"
          BACKEND_URL: "http://localhost:8080"
          RABBITMQ_HOST: "localhost"
          RABBITMQ_USER: "guest"
          RABBITMQ_PASS: "guest"
        run: pytest tests/ -v --tb=short

  # ── Job 2: Docker Build & Push ─────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: finance-ai
          file: finance-ai/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
