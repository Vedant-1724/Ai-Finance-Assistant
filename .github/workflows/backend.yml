# ─────────────────────────────────────────────────────────────────────────────
#  CI/CD — Spring Boot Backend
#  File: .github/workflows/backend.yml
#
#  Triggers:
#    • Push / PR that touches backend files
#    • Manual trigger
#
#  Design decisions (matching project reality):
#    • Uses actions/setup-java with Maven cache — NOT ./mvnw
#      (maven-wrapper.jar is gitignored, distributionType=only-script)
#    • Tests run with -Dspring.profiles.active=test
#      application-test.yaml uses H2 in-memory DB, disables Flyway,
#      excludes RabbitMQ, and uses simple cache — no external services
#    • Docker image pushed to ghcr.io on main branch pushes only
# ─────────────────────────────────────────────────────────────────────────────

name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Finance and Accounting Assistant/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Finance and Accounting Assistant/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/finance-backend

jobs:
  # ── Job 1: Build & Test ────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    # No external services needed — tests use H2 in-memory DB
    # (application-test.yaml disables Flyway, RabbitMQ, Redis health)

    defaults:
      run:
        working-directory: "Finance and Accounting Assistant"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: 'Finance and Accounting Assistant/pom.xml'

      # Tests use @ActiveProfiles("test") → H2 in-memory, no Postgres needed
      - name: Run Maven Tests
        run: mvn test -B -Dspring.profiles.active=test

      - name: Build JAR (skip tests — already ran above)
        run: mvn clean package -DskipTests -B -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-backend-jar
          path: "Finance and Accounting Assistant/target/*.jar"
          retention-days: 7

  # ── Job 2: Docker Build & Push ─────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: "Finance and Accounting Assistant"
          file: "Finance and Accounting Assistant/Dockerfile"
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
