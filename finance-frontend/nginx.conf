# Define a rate limit zone for API endpoints
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;
    
    # Allow certbot ACME challenges to succeed over HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Enforce HTTPS by redirecting all other HTTP traffic
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    # HTTPS/TLS Configuration
    # Use self-signed certs generated in Dockerfile for local testing
    ssl_certificate /etc/ssl/certs/server.crt;
    ssl_certificate_key /etc/ssl/private/server.key;
    
    # Hardened SSL Settings (Uncomment when deploying with Certbot)
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://checkout.razorpay.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https://lumberjack.razorpay.com;" always;

    # ── Proxy: Spring Boot API ───────────────────────────────────────────────
    location /api/ {
        # Apply rate limiting to all backend APIs (allow bursts of 20)
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 60s;
    }

    # ── Proxy: Spring Boot Actuator ──────────────────────────────────────────
    location /actuator/ {
        # Only allow internal Docker network/Prometheus IPs (e.g. from local environment)
        # Deny all public internet traffic to prevent metric/topology leaks
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        deny all;

        proxy_pass http://backend:8080/actuator/;
        proxy_set_header Host $host;
    }

    # ── Proxy: Python AI Service ─────────────────────────────────────────────
    location /ai/ {
        proxy_pass http://ai-service:5001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }

    # ── React Router: Serve index.html for all frontend routes ───────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}