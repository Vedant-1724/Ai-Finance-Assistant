# Define a rate limit zone for API endpoints
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;
    # Enforce HTTPS by redirecting all HTTP traffic
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # HTTPS/TLS Configuration
    ssl_certificate /etc/ssl/certs/server.crt;
    ssl_certificate_key /etc/ssl/private/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    # ── Proxy: Spring Boot API ───────────────────────────────────────────────
    location /api/ {
        # Apply rate limiting to all backend APIs (allow bursts of 20)
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 60s;
    }

    # ── Proxy: Spring Boot Actuator ──────────────────────────────────────────
    location /actuator/ {
        proxy_pass http://backend:8080/actuator/;
        proxy_set_header Host $host;
    }

    # ── Proxy: Python AI Service ─────────────────────────────────────────────
    location /ai/ {
        proxy_pass http://ai-service:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }

    # ── React Router: Serve index.html for all frontend routes ───────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}