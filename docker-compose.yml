services:

  # -- PostgreSQL Database -------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: finance-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: financedb
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d financedb" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # -- PostgreSQL Database Backups ----------------------------------------
  pg_backup:
    image: alpine:3.19
    container_name: finance-pg-backup
    restart: unless-stopped
    profiles: ["backup"]
    environment:
      POSTGRES_DB: financedb
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c 'apk add --no-cache aws-cli postgresql-client && echo "0 2 * * * PGPASSWORD=\$${POSTGRES_PASSWORD} pg_dump -h postgres -U \$${POSTGRES_USER} \$${POSTGRES_DB} | gzip > /tmp/db_backup.sql.gz && aws s3 cp /tmp/db_backup.sql.gz s3://\$${S3_BUCKET}/db_backup_\$$(date +\%Y\%m\%d).sql.gz" > /etc/crontabs/root && crond -f'

  # -- Redis Cache ---------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: finance-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # -- RabbitMQ Message Broker --------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: finance-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # -- Spring Boot Backend -------------------------------------------------
  backend:
    build:
      context: "./Finance and Accounting Assistant"
      dockerfile: Dockerfile
    container_name: finance-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/financedb
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: 86400000
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      MAIL_HOST: ${MAIL_HOST:-smtp.sendgrid.net}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-apikey}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-dummy}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_FROM: ${MAIL_FROM:-noreply@financeai.in}
      MAIL_EXPOSE_LINKS_WHEN_DISABLED: ${MAIL_EXPOSE_LINKS_WHEN_DISABLED:-true}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      BANK_SYNC_PROVIDER: ${BANK_SYNC_PROVIDER:-AUTO}
      SETU_BASE_URL: ${SETU_BASE_URL:-}
      SETU_CLIENT_ID: ${SETU_CLIENT_ID:-}
      SETU_CLIENT_SECRET: ${SETU_CLIENT_SECRET:-}
      SETU_CALLBACK_URL: ${SETU_CALLBACK_URL:-http://localhost:8080/api/v1/setu/callback}
      AI_SERVICE_URL: http://ai-service:5001
      AI_SERVICE_API_KEY: ${INTERNAL_API_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      APP_BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      APP_BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      APP_BOOTSTRAP_ADMIN_COMPANY_NAME: ${BOOTSTRAP_ADMIN_COMPANY:-}
      APP_BOOTSTRAP_ADMIN_PLAN: ${BOOTSTRAP_ADMIN_PLAN:-MAX}
      APP_BOOTSTRAP_ADMIN_CURRENCY: ${BOOTSTRAP_ADMIN_CURRENCY:-INR}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # -- Python AI Service ---------------------------------------------------
  ai-service:
    build:
      context: ./finance-ai
      dockerfile: Dockerfile
    container_name: finance-ai
    restart: unless-stopped
    ports:
      - "${AI_SERVICE_PORT:-5001}:5001"
    environment:
      BACKEND_URL: http://backend:8080
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASSWORD}
      PORT: 5001
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-pro}
      GEMINI_STATEMENT_MODEL: ${GEMINI_STATEMENT_MODEL:-gemini-2.5-pro}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # -- React Frontend (Nginx) ----------------------------------------------
  frontend:
    build:
      context: ./finance-frontend
      dockerfile: Dockerfile
    container_name: finance-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
      - ai-service
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  # -- Prometheus Monitoring -----------------------------------------------
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: finance-prometheus
    restart: unless-stopped
    expose:
      - "9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend

  # -- Grafana Dashboards --------------------------------------------------
  grafana:
    image: grafana/grafana:10.0.1
    container_name: finance-grafana
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  # -- Let's Encrypt Certbot -----------------------------------------------
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  pgdata:
  pg_backups:
  grafana_data:
  rabbitmq_data:

